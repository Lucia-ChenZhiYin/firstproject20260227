<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陳知茵的個人網站</title>
    <style>
        /* --- 全域設定 --- */
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            /* 背景圖片設定 */
            background: url('bkg.jpg');
            background-size: cover; 
            background-position: center;
            background-attachment: fixed; /* 讓背景固定不隨捲軸滾動 */
            /* 置中對齊設定 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background 0.5s ease; /* 讓切換深色模式時背景變色更柔和 */
        }
        
        .main-container{
            display: flex;
            flex-wrap: warp;
            justify-content: center;
            gap: 20px;
            width: 95%;
            max-width: 900px;
            padding: 20px 0;
        }

        /* --- 個人卡片本體 --- */
        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            flex: 1;
            min-width: 320px;
            max-width: 400px; 
            
            /* 呼叫下方定義的動畫 */
            animation: fadeInUp 1s ease-out forwards;
        }

        /* --- 頭像樣式 --- */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            /* --- 修改這裡 --- */
            background-image: url('Me.jpg'); /* 這裡填入你的檔名 */
            background-size: cover;          /* 讓照片自動填滿圓圈 */
            background-position: center;      /* 照片置中 */
            /* ---------------- */
            margin: 0 auto 1.5rem;
            border: 3px solid #f0f0f0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;/* 縮放過程變平滑 */
        }
        .avatar:hover {
            transform: scale(1.1); /* 滑鼠移上去放大 1.1 倍 */    
            cursor: pointer;
        }

        /* --- 文字內容樣式 --- */
        h1,h3 { color: #2c3e50; margin: 10px 0; font-size: 1.8rem; }
        p { color: #555; line-height: 1.8; margin-bottom: 20px; }

        /* --- 標籤樣式 --- */
        .tag {
            display: inline-block;
            background: #e1f5fe;
            color: #0288d1;
            padding: 5px 12px;
            border-radius: 25px;
            font-size: 0.8rem;
            margin: 3px;
            font-weight: bold;
        }

        /* --- 按鈕與連結 --- */
        .social-links { margin: 25px 0; }
        .btn {
            display: inline-block;
            padding: 12px;
            background-color: #333;
            color: white !important;
            text-decoration: none;
            border-radius: 8px;
            margin: 10px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }
        .btn:hover {
            background-color: #0288d1;
            transform: translateY(-3px); /* 滑鼠懸停往上彈 */
            box-shadow: 0 5px 15px rgba(2, 136, 209, 0.3);
        }
  
        /* --- 頁尾與切換按鈕 --- */
        .footer { margin-top: 20px; font-size: 0.85rem; color: #888; }
        .mode-toggle {
            margin-top: 20px;
            padding: 10px 15px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .mode-toggle:hover { background: #f0f0f0; }

        /* --- 深色模式設定 --- */
        .dark-mode {
            background: #404040 !important; /* 切換後底圖會消失變全黑 */
        }
        .dark-mode .card {
            background: #333333;
            color: #eee;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dark-mode h1 { color: #fff; }
        .dark-mode p { color: #bbb; }
        .dark-mode .mode-toggle { background: #444; color: white; border-color: #555; }

        /* --- 動態效果定義 (這就是讓網站動起來的關鍵) --- */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px); /* 從下方 40px 的位置 */
            }
            to {
                opacity: 1;
                transform: translateY(0);    /* 回到原位 */
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="avatar">
            </div>
        
        <h1>陳知茵</h1>
        <p>👋 你好！我就讀台北科技大學資訊與財經管理系，正在熟悉程式語言、AI 應用與金融領域知識。</p>
        
        <div>
            <span class="tag">程式技能學習</span>
            <span class="tag">GitHub 作品集製作中</span>
            <span class="tag">目標大四實習機會</span>
        </div>

        <div class="social-links">
            <a href="https://instagram.com/你的帳號" target="_blank" class="btn">Instagram</a>
            <a href="mailto:t113ab0016@ntut.org.tw" class="btn">傳送郵件</a>
        </div>

        <div class="footer">
            📫 聯絡我：t113ab0016@ntut.org.tw
        </div>

        <div style="margin-top: 30px;">
            <a href="invest.html" class="btn" style="background-color: #2e7d32;">開啟複利計算機 📈</a>
        </div>

        <button class="mode-toggle" onclick="toggleDarkMode()">切換深/淺色模式</button>
    </div>

    <script>
        function toggleDarkMode() {
            var element = document.body;
            // 在 body 標籤上切換 .dark-mode 類別
            element.classList.toggle("dark-mode");
        }
    </script>

</body>
</html>
